[tox]
env_list =
    lint
    py311
    py312
    package
isolated_build = true
skip_missing_interpreters = false

[testenv]
package = editable
extras = dev
commands =
    pytest --no-cov

[testenv:lint]
base_python = python3.11
commands =
    ruff format --check src/antipasta tests
    ruff check src/antipasta tests
    mypy src/antipasta tests

[testenv:py311]
base_python = python3.11

[testenv:py312]
base_python = python3.12

[testenv:package]
base_python = python3.11
skip_install = true
deps =
    build>=1.5.0
    check-wheel-contents>=0.6.3
commands =
    python -c "import shutil; shutil.rmtree('dist', ignore_errors=True)"
    python -m build
    python -c "from pathlib import Path; import subprocess; wheels = sorted(Path('dist').glob('*.whl')); assert wheels, 'No wheels built'; subprocess.run(['check-wheel-contents', *map(str, wheels)], check=True)"
