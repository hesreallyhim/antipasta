defaults:
  max_cyclomatic_complexity: 10.0
  max_cognitive_complexity: 15.0
  min_maintainability_index: 0.0
  max_halstead_volume: 5000.0
  max_halstead_difficulty: 50.0
  max_halstead_effort: 100000.0

profile: relaxed

languages:
  - name: python
    extensions:
      - .py
    metrics:
      - type: message_chain_depth
        threshold: 2.0
        comparison: "<="
      - type: exception_discipline
        threshold: 0.0
        comparison: "<="
      - type: global_state_reach
        threshold: 0.0
        comparison: "<="
      - type: function_statements
        threshold: 12.0
        comparison: "<="
      - type: marker_density
        threshold: 0.0
        comparison: "<="
      - type: comment_density
        threshold: 12.0
        comparison: "<="
      - type: lack_of_cohesion
        threshold: 1.0
        comparison: "<="
      - type: coupling_between_objects
        threshold: 3.0
        comparison: "<="
      - type: assertions_per_test
        threshold: 3.0
        comparison: "<="
      - type: mock_call_assertions
        threshold: 0.0
        comparison: "<="
      - type: big_literal_assertions
        threshold: 0.0
        comparison: "<="

narrative:
  narrator_step_budget: 7
  computer_statement_budget: 12
  computer_nesting_budget: 1
  mixing_tolerance: 20
  name_clarity_floor: 0.7
  allowlist:
    - api
    - csv
    - id
    - json
    - sku
    - vip

ignore_patterns: []
use_gitignore: false
